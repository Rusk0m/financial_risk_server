# Server Configuration
server:
  port: "8080"
  environment: "development"
  read_timeout: 10  # seconds
  write_timeout: 10 # seconds
  idle_timeout: 30  # seconds

# Database Configuration
database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "2005"  # используем ваш пароль
  name: "financial_risk_db2"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 3600 # seconds

# Конфигурация загрузки файлов
uploads:
  directory: "./uploads"
  max_size: 10485760  # 10 МБ


market_data:
  enabled: "true"
  interval_hours: 24
  initial_delay_seconds: 60
  history_days: 100